<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Melectra Cotizaciones{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5; color: #333; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1rem;
    }
    .container {
      background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
      max-width: 700px; width: 100%; padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a1a; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #444; }
    label { display: block; font-weight: 600; margin-bottom: .3rem; color: #555; }
    input[type="text"], input[type="file"], select {
      width: 100%; padding: .5rem; border: 1px solid #ccc;
      border-radius: 4px; font-size: .95rem; margin-bottom: 1rem;
    }
    input[type="text"]:focus, select:focus {
      outline: none; border-color: #001781;
    }
    .form-group { margin-bottom: 1rem; }
    .btn {
      display: inline-block; padding: .6rem 1.4rem; border: none;
      border-radius: 4px; font-size: .95rem; cursor: pointer;
      text-decoration: none; color: #fff; background: #001781;
    }
    .btn:hover { background: #001160; }
    .btn-success { background: #FF8600; }
    .btn-success:hover { background: #d97000; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #545b62; }
    .error {
      background: #f8d7da; color: #721c24; padding: .75rem 1rem;
      border-radius: 4px; margin-bottom: 1rem; border: 1px solid #f5c6cb;
    }
    .drop-zone {
      border: 2px dashed #aaa; border-radius: 8px; padding: 2rem;
      text-align: center; color: #888; cursor: pointer;
      transition: border-color .2s, background .2s; margin-bottom: 1rem;
    }
    .drop-zone.dragover { border-color: #001781; background: #eef4fb; }
    .drop-zone p { margin: 0; }
    .step-indicator {
      display: flex; gap: .5rem; margin-bottom: 1.5rem; font-size: .85rem;
    }
    .step {
      padding: .25rem .75rem; border-radius: 12px; background: #e9ecef; color: #666;
    }
    .step.active { background: #001781; color: #fff; }
    .step.done { background: #FF8600; color: #fff; }
    .table-preview { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
    .table-preview th {
      text-align: left; padding: .5rem; background: #f0f0f0;
      border-bottom: 2px solid #ccc; font-size: .85rem; color: #555;
    }
    .table-preview td { padding: .5rem; border-bottom: 1px solid #eee; }
    .table-preview input {
      width: 100%; padding: .35rem .4rem; border: 1px solid #ccc;
      border-radius: 3px; font-size: .9rem;
    }
    .actions { display: flex; gap: .75rem; margin-top: 1rem; }
    .success-box {
      background: #d4edda; color: #155724; padding: 1rem;
      border-radius: 4px; border: 1px solid #c3e6cb; margin-bottom: 1rem;
    }
    .warning-box {
      background: #fff3cd; color: #856404; padding: 1rem;
      border-radius: 4px; border: 1px solid #ffeaa7; margin-bottom: 1rem;
    }
    .rutas-guardadas {
      margin-bottom: 1rem; display: flex; align-items: flex-start; gap: .5rem; flex-wrap: wrap;
    }
    .rutas-label { font-size: .8rem; color: #888; white-space: nowrap; padding-top: .3rem; }
    .rutas-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .ruta-chip {
      display: inline-flex; align-items: center; gap: .25rem;
      background: #eef4fb; border: 1px solid #c0d8f0; border-radius: 20px;
      padding: .2rem .6rem; font-size: .8rem;
    }
    .ruta-nombre { cursor: pointer; color: #001160; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ruta-nombre:hover { text-decoration: underline; }
    .ruta-del {
      background: none; border: none; color: #aaa; cursor: pointer;
      font-size: .95rem; line-height: 1; padding: 0 .1rem;
    }
    .ruta-del:hover { color: #c0392b; }
    /* Botón cerrar app */
    #btn-cerrar-app {
      position: fixed; top: 1rem; right: 1rem; z-index: 9999;
      background: #c0392b; color: #fff; border: none; border-radius: 4px;
      padding: .45rem 1rem; font-size: .85rem; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.25); opacity: .85;
      transition: opacity .15s, background .15s;
    }
    #btn-cerrar-app:hover { opacity: 1; background: #a93226; }
  </style>
</head>
<body>
  <button id="btn-cerrar-app" onclick="confirmShutdown()">&#x2715; Cerrar app</button>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    function confirmShutdown() {
      if (typeof window.__beforeShutdown === 'function') {
        window.__beforeShutdown();
      } else {
        doShutdown();
      }
    }
    function doShutdown() {
      fetch('/shutdown', { method: 'POST' }).catch(() => {});
      document.body.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100vh;' +
        'font-family:sans-serif;flex-direction:column;gap:1rem;color:#444;">' +
        '<p style="font-size:1.3rem;">Aplicación cerrada.</p>' +
        '<p style="font-size:.95rem;color:#888;">Puede cerrar esta pestaña.</p></div>';
    }
  </script>
</body>
</html>
